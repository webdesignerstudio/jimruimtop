<!DOCTYPE html>
<html lang="nl">
<head>

    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brandNavy: '#1A436D',
                        brandCyan: '#5BCEFF',
                        brandCream: '#F4F0E6',
                        brandGreen: '#7CC19D',

                    fontFamily: {
                        headline: ['Manrope', 'sans-serif'],
                        body: ['Inter', 'sans-serif'],
                    }
                }
            }
        }

            <div class="flex flex-col sm:flex-row gap-4 justify-center items-center">
                <a href="index.html" class="inline-block bg-brandNavy text-white px-8 py-4 rounded-full font-bold text-lg hover:bg-brandCyan hover:text-brandNavy transition-all shadow-lg">
                    <span class="flex items-center gap-2">
                        <span class="material-symbols-outlined">home</span>
                        Terug naar Home
                    </span>
                </a>
                <a href="contact.html" class="inline-block border-2 border-brandNavy text-brandNavy px-8 py-4 rounded-full font-bold text-lg hover:bg-brandNavy hover:text-white transition-all">
                    Contact Opnemen

            </div>
            
            <!-- Quick Links -->
            <div class="mt-12 pt-8 border-t border-gray-300">
                <p class="text-sm text-gray-500 mb-4">Populaire pagina's:</p>
                <div class="flex flex-wrap gap-4 justify-center">
                    <a href="diensten.html" class="text-brandNavy hover:text-brandCyan font-semibold transition-colors">Diensten</a>
                    <span class="text-gray-300">|</span>
                    <a href="over-mij.html" class="text-brandNavy hover:text-brandCyan font-semibold transition-colors">Over Mij</a>

                    <a href="contact.html" class="text-brandNavy hover:text-brandCyan font-semibold transition-colors">Contact</a>

            </div>
